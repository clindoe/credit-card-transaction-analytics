AWSTemplateFormatVersion: "2010-09-09"
Description: >
  S3 data lake bucket for the credit card transaction analytics pipeline.
  Includes versioning, AES-256 encryption, public-access block, and
  lifecycle policies for each medallion zone (raw/staging/analytics/exports).

Parameters:
  ProjectName:
    Type: String
    Default: credit-txn-analytics
  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]
  BucketName:
    Type: String
    Default: credit-txn-analytics-adil
    Description: >
      Globally unique bucket name. Change per environment:
      dev → credit-txn-analytics-adil-dev, etc.

Resources:
  # ── Primary data lake bucket ──────────────────────────────────────────────────
  DataLakeBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain      # Never delete on stack teardown — data safety first
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref BucketName

      VersioningConfiguration:
        Status: Enabled           # Needed for safe Glue concurrent writes

      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

      LifecycleConfiguration:
        Rules:
          # Raw zone: cheaper after 30 days, archive after 90, expire after 1 year
          - Id: RawZoneLifecycle
            Status: Enabled
            Prefix: raw/
            Transitions:
              - TransitionInDays: 30
                StorageClass: STANDARD_IA
              - TransitionInDays: 90
                StorageClass: GLACIER
            ExpirationInDays: 365

          # Staging zone: less accessed — move to IA sooner
          - Id: StagingZoneLifecycle
            Status: Enabled
            Prefix: staging/transactions_cleaned/
            Transitions:
              - TransitionInDays: 60
                StorageClass: STANDARD_IA
            ExpirationInDays: 365

          # Quality reports: short retention (diagnostic only)
          - Id: QualityReportsLifecycle
            Status: Enabled
            Prefix: staging/data_quality_reports/
            ExpirationInDays: 90

          # Quarantine: investigate within 30 days or discard
          - Id: QuarantineLifecycle
            Status: Enabled
            Prefix: staging/quarantine/
            ExpirationInDays: 30

          # Analytics (Gold): keep hot for 6 months, IA after that
          - Id: AnalyticsZoneLifecycle
            Status: Enabled
            Prefix: analytics/
            Transitions:
              - TransitionInDays: 180
                StorageClass: STANDARD_IA

          # Temp Glue dir: clean up quickly
          - Id: GlueTempLifecycle
            Status: Enabled
            Prefix: glue-temp/
            ExpirationInDays: 7

          # Delete non-current versions after 30 days (versioning housekeeping)
          - Id: NoncurrentVersionCleanup
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 30

      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: DataClassification
          Value: Internal

  # ── Bucket policy: deny non-TLS traffic ──────────────────────────────────────
  DataLakeBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DataLakeBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyNonTLS
            Effect: Deny
            Principal: "*"
            Action: s3:*
            Resource:
              - !GetAtt DataLakeBucket.Arn
              - !Sub "${DataLakeBucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: "false"

Outputs:
  BucketName:
    Value: !Ref DataLakeBucket
    Export:
      Name: !Sub "${ProjectName}-${Environment}-bucket-name"

  BucketArn:
    Value: !GetAtt DataLakeBucket.Arn
    Export:
      Name: !Sub "${ProjectName}-${Environment}-bucket-arn"

  RawPrefix:
    Value: !Sub "s3://${DataLakeBucket}/raw/transactions/"
  StagingPrefix:
    Value: !Sub "s3://${DataLakeBucket}/staging/transactions_cleaned/"
  AnalyticsPrefix:
    Value: !Sub "s3://${DataLakeBucket}/analytics/"
  ExportsPrefix:
    Value: !Sub "s3://${DataLakeBucket}/exports/"
